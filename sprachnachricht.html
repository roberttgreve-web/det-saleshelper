<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KI-Sprachnachricht – DET SalesHelper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand: #00afd6;
      --yellow: #ffec5c;
      --dark: #181818;
      --light: #fafafa;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Roboto', sans-serif;
      background: var(--light);
      color: var(--dark);
      min-height: 100vh;
    }
    header {
      background: white;
      border-bottom: 1px solid #eaeaea;
      padding: 0 48px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header img { height: 28px; }
    header .divider { width: 1px; height: 20px; background: rgba(24,24,24,0.15); }
    header .app-name { font-size: 15px; font-weight: 500; color: var(--dark); letter-spacing: 0.01em; }
    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 80px 32px;
    }
    .page-eyebrow {
      font-size: 11px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--brand);
      font-weight: 500;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }
    .desc {
      font-size: 15px;
      color: rgba(24,24,24,0.65);
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .player-card {
      background: var(--yellow);
      border-radius: 20px;
      padding: 32px;
    }
    audio { width: 100%; }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 32px;
      font-size: 14px;
      font-weight: 500;
      color: var(--brand);
      text-decoration: none;
    }
  </style>
</head>
<body>

<header>
  <img src="Large.svg" alt="DEIN ERSTER TAG" />
  <div class="divider"></div>
  <span class="app-name">SalesHelper</span>
</header>

<main>
  <div class="page-eyebrow">Prototyp</div>
  <h1>KI-Sprachnachricht</h1>
  <p class="desc">Ein Beispiel für eine KI-generierte Sprachnachricht, wie sie Schüler*innen auf der Schulcard im Schulportal hören.</p>

  <div class="player-card">
    <audio controls autoplay src="Sprachnachricht.mp3">
      Dein Browser unterstützt kein Audio-Element.
    </audio>
  </div>

  <a class="back-link" href="/">
    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    Zurück zum SalesHelper
  </a>
</main>

</body>
</html>
